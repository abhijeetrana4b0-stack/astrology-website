<!DOCTYPE html>
<html>
<head>
    <title>Astrology 🔮</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="box">
    <h1>🔮 Astrology Predictor</h1>

    <form method="POST">
        <input type="date" name="dob" required>
        <br>
        <button type="submit">Check Zodiac</button>
    </form>

    {% if zodiac %}
        <h2>{{ zodiac }}</h2>
        <h3>{{ horoscope }}</h3>
    {% endif %}
</div>

</body>
</html>
